<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#f8f7f4"/>
  <!-- calendar outline -->
  <rect x="4" y="7" width="24" height="21" rx="2.5" fill="none" stroke="#111110" stroke-width="2"/>
  <!-- header fill -->
  <rect x="4" y="7" width="24" height="8" rx="2.5" fill="#111110"/>
  <rect x="4" y="12" width="24" height="3" fill="#111110"/>
  <!-- pegs -->
  <rect x="10.5" y="4.5" width="2" height="5" rx="1" fill="#111110"/>
  <rect x="19.5" y="4.5" width="2" height="5" rx="1" fill="#111110"/>
  <!-- date grid: 3 cols x 2 rows, tighter and smaller -->
  <rect x="8"    y="17" width="4" height="3.5" rx="1" fill="#111110"/>
  <rect x="14"   y="17" width="4" height="3.5" rx="1" fill="#111110"/>
  <rect x="20"   y="17" width="4" height="3.5" rx="1" fill="#111110"/>
  <rect x="8"    y="22" width="4" height="3.5" rx="1" fill="#111110"/>
  <rect x="14"   y="22" width="4" height="3.5" rx="1" fill="#111110"/>
</svg>
